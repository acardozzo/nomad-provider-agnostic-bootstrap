---
ansible_user: root

consul_version: "1.20.5"
nomad_version: "1.10.2"

cluster_name: "nomad-cluster"
nomad_datacenter: "dc1"
nomad_bind_addr: "0.0.0.0"
nomad_data_dir: "/var/lib/nomad"
consul_data_dir: "/var/lib/consul"
traefik_version: "v3.1"

# Filled by ansible/playbooks/secrets.yml — DO NOT set by hand
consul_gossip_key: ""
nomad_gossip_key: ""
consul_bootstrap_token: ""
nomad_bootstrap_token: ""
nomad_ingress_token: ""

# Production ingress
traefik_domain: "cluster.local"
traefik_dashboard_host: "traefik.cluster.local"
acme_email: "ops@cluster.local"
acme_storage_host_path: "/opt/traefik/acme"
acme_enabled: true                # set false in local/dev mode → Traefik uses self-signed cert
acme_caserver: ""                 # set to "https://acme-staging-v02.api.letsencrypt.org/directory" for staging
dashboard_basic_auth_user: "admin"
# Filled by ansible/playbooks/secrets.yml
dashboard_basic_auth_htpasswd: ""
