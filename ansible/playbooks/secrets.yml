---
- name: Manage cluster secrets (idempotent)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    secrets_file: "{{ playbook_dir }}/../inventory/group_vars/all/secrets.yml"
    secrets_dir: "{{ playbook_dir }}/../inventory/.secrets"
  tasks:
    - name: Ensure secrets dir exists
      ansible.builtin.file:
        path: "{{ secrets_dir }}"
        state: directory
        mode: "0700"

    - name: Load existing secrets (if any)
      ansible.builtin.set_fact:
        existing_secrets: "{{ lookup('ansible.builtin.file', secrets_file, errors='ignore') | default('', true) | from_yaml | default({}, true) }}"

    - name: Generate Consul gossip key (if missing)
      ansible.builtin.command: openssl rand -base64 32
      register: consul_key_gen
      when: existing_secrets.consul_gossip_key | default('') == ''
      changed_when: existing_secrets.consul_gossip_key | default('') == ''

    - name: Generate Nomad gossip key (if missing)
      ansible.builtin.command: openssl rand -base64 32
      register: nomad_key_gen
      when: existing_secrets.nomad_gossip_key | default('') == ''
      changed_when: existing_secrets.nomad_gossip_key | default('') == ''

    - name: Generate dashboard password (if missing)
      ansible.builtin.shell: |
        set -o pipefail
        openssl rand -base64 24 | tr -d '\n'
      args:
        executable: /bin/bash
      register: dashboard_pw_gen
      when: existing_secrets.dashboard_basic_auth_password | default('') == ''
      changed_when: existing_secrets.dashboard_basic_auth_password | default('') == ''

    - name: Compose dashboard password fact
      ansible.builtin.set_fact:
        dashboard_password: "{{ existing_secrets.dashboard_basic_auth_password | default(dashboard_pw_gen.stdout | default('')) }}"

    - name: Compute htpasswd hash for Traefik basicauth
      # Nomad does NOT interpolate inside `tags = [...]` strings, so we emit
      # the bcrypt hash verbatim (no $$-doubling). Traefik consumes the literal
      # `$2y$05$...` directly from the Consul tag.
      ansible.builtin.command:
        argv:
          - htpasswd
          - -nbB
          - "{{ dashboard_basic_auth_user | default('admin') }}"
          - "{{ dashboard_password }}"
      register: dashboard_htpasswd
      when: dashboard_password != ''
      changed_when: false

    - name: Build merged secrets fact
      ansible.builtin.set_fact:
        merged_secrets:
          consul_gossip_key: "{{ existing_secrets.consul_gossip_key | default(consul_key_gen.stdout | default('')) }}"
          nomad_gossip_key: "{{ existing_secrets.nomad_gossip_key | default(nomad_key_gen.stdout | default('')) }}"
          consul_bootstrap_token: "{{ existing_secrets.consul_bootstrap_token | default('') }}"
          nomad_bootstrap_token: "{{ existing_secrets.nomad_bootstrap_token | default('') }}"
          nomad_ingress_token: "{{ existing_secrets.nomad_ingress_token | default('') }}"
          dashboard_basic_auth_password: "{{ dashboard_password | default('') }}"
          dashboard_basic_auth_htpasswd: "{{ existing_secrets.dashboard_basic_auth_htpasswd | default(dashboard_htpasswd.stdout | default('')) }}"
          cloudflare_dns_api_token: "{{ existing_secrets.cloudflare_dns_api_token | default('') }}"

    - name: Write secrets file
      ansible.builtin.copy:
        dest: "{{ secrets_file }}"
        mode: "0600"
        content: "{{ merged_secrets | to_nice_yaml }}"
