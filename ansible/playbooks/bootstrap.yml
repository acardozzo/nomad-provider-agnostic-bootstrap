---
- name: Bootstrap Nomad cluster
  hosts: all
  become: true
  roles:
    - common
    - hardening
    - consul
    - nomad

- name: Deploy Traefik ingress
  hosts: servers[0]
  become: true
  roles:
    - traefik

- name: Deploy sample app behind Traefik
  hosts: servers[0]
  become: true
  roles:
    - sample_app

- name: Deploy backup jobs
  hosts: servers[0]
  become: true
  roles:
    - backups
