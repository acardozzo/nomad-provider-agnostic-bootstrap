---
- name: Ensure Nomad jobs directory exists
  ansible.builtin.file:
    path: /opt/nomad/jobs
    state: directory
    owner: nomad
    group: nomad
    mode: "0755"

- name: Ensure Prometheus data directory exists on clients (uid 65534 = nobody)
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"
  delegate_to: "{{ item }}"
  loop: "{{ groups['clients'] }}"
  run_once: true

- name: Ensure Grafana data directory exists on clients
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  delegate_to: "{{ item }}"
  loop: "{{ groups['clients'] }}"
  run_once: true

- name: Render monitoring jobs
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/opt/nomad/jobs/{{ item }}"
    owner: nomad
    group: nomad
    mode: "0644"
  loop:
    - node-exporter.nomad.hcl
    - prometheus.nomad.hcl
    - grafana.nomad.hcl

- name: Submit monitoring jobs
  ansible.builtin.command: "nomad job run /opt/nomad/jobs/{{ item }}"
  environment:
    NOMAD_TOKEN: "{{ nomad_bootstrap_token }}"
  loop:
    - node-exporter.nomad.hcl
    - prometheus.nomad.hcl
    - grafana.nomad.hcl
  register: mon_jobs
  changed_when: "'job registration successful' in mon_jobs.stdout.lower() or 'previously registered' in mon_jobs.stdout.lower()"
