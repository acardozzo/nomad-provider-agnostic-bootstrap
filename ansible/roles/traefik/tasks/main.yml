---
- name: Validate required ingress vars
  ansible.builtin.assert:
    that:
      - traefik_domain | length > 0
      - traefik_dashboard_host | length > 0
      - acme_email | length > 0
      - dashboard_basic_auth_htpasswd | length > 0
    fail_msg: "Set traefik_domain, traefik_dashboard_host, acme_email in ansible/group_vars/all.yml; rerun secrets.yml to populate dashboard credentials."

- name: Create Traefik ACME storage directory
  ansible.builtin.file:
    path: "{{ acme_storage_host_path }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Pre-create acme.json with strict permissions
  ansible.builtin.file:
    path: "{{ acme_storage_host_path }}/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Create Traefik jobs directory
  ansible.builtin.file:
    path: /opt/nomad/jobs
    state: directory
    owner: nomad
    group: nomad
    mode: "0755"

- name: Render Traefik Nomad job
  ansible.builtin.template:
    src: traefik.nomad.hcl.j2
    dest: /opt/nomad/jobs/traefik.nomad.hcl
    owner: nomad
    group: nomad
    mode: "0644"

- name: Wait for Nomad servers to elect a leader
  ansible.builtin.command: nomad server members
  environment:
    NOMAD_TOKEN: "{{ nomad_bootstrap_token }}"
  register: nomad_server_members
  changed_when: false
  retries: 20
  delay: 5
  until: nomad_server_members.rc == 0

- name: Run Traefik job
  ansible.builtin.command: nomad job run /opt/nomad/jobs/traefik.nomad.hcl
  environment:
    NOMAD_TOKEN: "{{ nomad_bootstrap_token }}"
  register: traefik_job_run
  changed_when: "'job registration successful' in traefik_job_run.stdout.lower() or 'previously registered' in traefik_job_run.stdout.lower()"
