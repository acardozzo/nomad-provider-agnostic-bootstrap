---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - docker.io
      - jq
      - unzip
    state: present

- name: Enable docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
