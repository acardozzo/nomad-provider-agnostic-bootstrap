---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure unattended-upgrades (security only, auto-reboot at 03:00)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades.local
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

- name: Enable unattended-upgrades periodic
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure fail2ban for sshd
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [sshd]
      enabled = true
      port = ssh
      maxretry = 4
      bantime = 1h
      findtime = 10m
  notify: restart fail2ban

- name: Harden sshd config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      KbdInteractiveAuthentication no
      X11Forwarding no
      ClientAliveInterval 300
      ClientAliveCountMax 2
      MaxAuthTries 4
      LoginGraceTime 30
  notify: restart sshd

- name: Configure UFW default policies
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Configure UFW outgoing default
  community.general.ufw:
    state: enabled
    policy: allow
    direction: outgoing

- name: Allow SSH from anywhere
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow ingress traffic on clients (HTTP/HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
  when: inventory_hostname in groups['clients']

- name: Allow Consul/Nomad/Serf gossip on private network
  community.general.ufw:
    rule: allow
    from_ip: "{{ hostvars[item].private_ip | default(hostvars[item].ansible_host) }}"
  loop: "{{ groups['all'] }}"

- name: Enable services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - fail2ban
    - unattended-upgrades
