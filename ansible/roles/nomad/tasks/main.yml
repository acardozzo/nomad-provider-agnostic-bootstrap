---
- name: Create nomad group
  ansible.builtin.group:
    name: nomad
    system: true

- name: Create nomad user (secondary group docker for socket access)
  ansible.builtin.user:
    name: nomad
    group: nomad
    groups:
      - docker
    append: true
    shell: /usr/sbin/nologin
    system: true
    create_home: false
  notify: Restart nomad

- name: Create nomad directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: nomad
    group: nomad
    mode: "0755"
  loop:
    - /etc/nomad.d
    - "{{ nomad_data_dir }}"
    # Nomad creates <data_dir-sibling>/alloc_mounts at startup — but only if it
    # has write on the parent. Service runs as user nomad → /var/lib is root-only.
    # Pre-create the sibling dir with nomad ownership so the agent can use it.
    # https://developer.hashicorp.com/nomad/docs/configuration/client#alloc_mounts_dir
    - "{{ nomad_data_dir | dirname }}/alloc_mounts"

- name: Map machine arch to release arch (nomad)
  ansible.builtin.set_fact:
    _hashi_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64'}[ansible_architecture] }}"

- name: Download nomad archive
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_{{ _hashi_arch }}.zip"
    dest: "/tmp/nomad_{{ nomad_version }}_linux_{{ _hashi_arch }}.zip"
    mode: "0644"

- name: Install nomad binary
  ansible.builtin.unarchive:
    src: "/tmp/nomad_{{ nomad_version }}_linux_{{ _hashi_arch }}.zip"
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Render nomad config
  ansible.builtin.template:
    src: "{{ 'nomad-server.hcl.j2' if inventory_hostname in groups['servers'] else 'nomad-client.hcl.j2' }}"
    dest: /etc/nomad.d/nomad.hcl
    owner: nomad
    group: nomad
    mode: "0640"
  notify: Restart nomad

- name: Render nomad service
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart nomad

- name: Enable nomad service
  ansible.builtin.systemd:
    name: nomad
    daemon_reload: true
    enabled: true
    state: started

- name: Wait for Nomad to be ready (server)
  ansible.builtin.uri:
    url: "http://127.0.0.1:4646/v1/status/leader"
    status_code: 200
  register: nomad_leader_check
  retries: 30
  delay: 2
  until: nomad_leader_check.status == 200
  when: inventory_hostname in groups['servers']

- name: Bootstrap Nomad ACL (only on first server, only if no token captured yet)
  ansible.builtin.command: nomad acl bootstrap -json
  register: nomad_acl_bootstrap
  run_once: true
  delegate_to: "{{ groups['servers'][0] }}"
  when:
    - inventory_hostname == groups['servers'][0]
    - (nomad_bootstrap_token | default('')) == ''
  changed_when: nomad_acl_bootstrap.rc == 0
  failed_when:
    - nomad_acl_bootstrap.rc != 0
    - "'No cluster leader' not in (nomad_acl_bootstrap.stderr | default(''))"
    - "'ACL bootstrap already done' not in (nomad_acl_bootstrap.stderr | default(''))"

- name: Capture Nomad bootstrap token as fact (so later tasks can use it)
  ansible.builtin.set_fact:
    nomad_bootstrap_token: "{{ (nomad_acl_bootstrap.stdout | from_json).SecretID }}"
  run_once: true
  when:
    - nomad_acl_bootstrap is defined
    - nomad_acl_bootstrap is not skipped
    - nomad_acl_bootstrap.stdout is defined
    - nomad_acl_bootstrap.stdout | length > 0

- name: Persist Nomad bootstrap token to local secrets file
  ansible.builtin.lineinfile:
    path: "{{ playbook_dir }}/../inventory/group_vars/all/secrets.yml"
    regexp: '^nomad_bootstrap_token:'
    line: "nomad_bootstrap_token: \"{{ nomad_bootstrap_token }}\""
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - nomad_acl_bootstrap is defined
    - nomad_acl_bootstrap is not skipped
    - nomad_acl_bootstrap.stdout is defined
    - nomad_acl_bootstrap.stdout | length > 0
