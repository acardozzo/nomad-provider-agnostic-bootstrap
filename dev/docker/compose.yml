# Traefik + whoami smoke — docker-compose flavour.
#
# Purpose: fast feedback on Traefik flags, ACME-disabled flow, and routing.
# This is NOT a Nomad cluster simulator — for that, use Multipass (see
# docs/local-testing.md). Nomad-in-Docker on macOS is too brittle to ship.
#
# What this validates:
#   - The Traefik flags we render in production are accepted by the binary
#   - HTTP→HTTPS redirect works
#   - Hostname routing works
#   - TLS uses the default self-signed cert (acme_enabled=false equivalent)
#   - whoami responds through Traefik
#
# Run:
#   make local-traefik-up
#   make local-traefik-smoke
#   make local-traefik-down

name: nomad-bootstrap-traefik-smoke

networks:
  ingress:
    driver: bridge

services:
  traefik:
    image: traefik:v3.1
    container_name: dev-traefik
    networks:
      - ingress
    ports:
      - "18080:80"       # host:container — :80 in container
      - "18443:443"
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.cluster.local`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.service=api@internal

  whoami:
    image: traefik/whoami:v1.10
    container_name: dev-whoami
    networks:
      - ingress
    labels:
      - traefik.enable=true
      - traefik.http.routers.whoami.rule=Host(`cluster.local`) && PathPrefix(`/whoami`)
      - traefik.http.routers.whoami.entrypoints=websecure
      - traefik.http.routers.whoami.tls=true
      - traefik.http.routers.whoami.middlewares=whoami-strip
      - traefik.http.middlewares.whoami-strip.stripprefix.prefixes=/whoami
      - traefik.http.services.whoami.loadbalancer.server.port=80
